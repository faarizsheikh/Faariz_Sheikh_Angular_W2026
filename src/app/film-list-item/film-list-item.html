<!-- film-list-item.html: -->

@if (film) {
<div class="film-card" [ngClass]="isEven ? 'even' : 'odd'" (click)="onClick()">
  <img class="preview-image" [src]="film.image_url" [alt]="film.title + ' (' + film.yearReleased + ')'" [title]="film.title + ' (' + film.yearReleased + ')'
         + '.\n\nStarring:\n' + film.starring.split(', ').slice(0, 5).join(', ')">
  <h2>{{ film.title }} ({{ film.yearReleased }})</h2>
</div>
}
